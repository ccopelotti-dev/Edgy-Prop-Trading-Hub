                            cancelText="Cancelar"
                            width={500}
                        >
                            <Form form={incomeForm} layout="vertical">
                                <Form.Item name="sourceAccount" label="Cuenta Origen (Solo Master/Live)" rules={[{ required: true, message: 'Requerido' }]}>
                                    <Select placeholder="Selecciona de dónde provienen los fondos">
                                        {accounts.filter(a => a.type === 'Master' || a.type === 'Live').map(acc => (
                                            <Select.Option key={acc.key} value={acc.name}>{acc.name} ({acc.company})</Select.Option>
                                        ))}
                                    </Select>
                                </Form.Item>

                                <Form.Item name="description" label="Descripción / Motivo" rules={[{ required: true, message: 'Requerido' }]}>
                                    <Input placeholder="Ej. Primer Retiro Tradeify" />
                                </Form.Item>

                                <Form.Item name="amount" label="Monto Retirado (USD)" rules={[{ required: true, message: 'Requerido' }]}>
                                    <InputNumber style={{ width: '100%' }} min={0} formatter={value => `$ ${value}`.replace(/\B(?=(\d{3})+(?!\d))/g, ',')} parser={value => value.replace(/\$\s?|(,*)/g, '')} />
                                </Form.Item>
                            </Form>
                        </Modal>

                        {/* Modal para Avance Manual */}
                        <Modal
                            title="Cargar Avance Manual"
                            open={isLucidModalVisible}
                            onOk={handleLucidOk}
                            onCancel={() => { setIsLucidModalVisible(false); lucidForm.resetFields(); }}
                            okText="Guardar Avance"
                            cancelText="Cancelar"
                            width={400}
                        >
                            <Form form={lucidForm} layout="vertical">
                                <Form.Item name="accountKey" label="Seleccionar Cuenta" rules={[{ required: true, message: 'Requerido' }]}>
                                    <Select placeholder="Seleccione la cuenta a actualizar">
                                        {accounts.map(acc => (
                                            <Select.Option key={acc.key || acc.id} value={acc.key || acc.id}>
                                                {acc.name} ({acc.company})
                                            </Select.Option>
                                        ))}
                                    </Select>
                                </Form.Item>
                                <Form.Item name="dailyPnl" label="P&L / Avance a Registrar ($)" rules={[{ required: true, message: 'Requerido' }]}>
                                    <InputNumber style={{ width: '100%' }} formatter={value => `$ ${value}`.replace(/\B(?=(\d{3})+(?!\d))/g, ',')} parser={value => value.replace(/\$\s?|(,*)/g, '')} />
                                </Form.Item>
                            </Form>
                        </Modal>

                        {/* Modal Prop Trading */}
                        <Modal title="Nueva Cuenta Prop Trading" open={isPropModalVisible} onCancel={() => { setIsPropModalVisible(false); propForm.resetFields(); }} onOk={() => propForm.submit()} okText="Guardar" cancelText="Cancelar">
                            <Form form={propForm} layout="vertical" onFinish={handlePropSubmit}>
                                <Row gutter={16}>
                                    <Col span={12}>
                                        <Form.Item name="firm" label="Compañía" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Input placeholder="Ej. Tradeify, Topstep" />
                                        </Form.Item>
                                    </Col>
                                    <Col span={12}>
                                        <Form.Item name="name" label="Nombre" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Input placeholder="Ej. Tradeify PA #1" />
                                        </Form.Item>
                                    </Col>
                                </Row>
                                <Form.Item name="type" label="Tipo" rules={[{ required: true, message: 'Requerido' }]}>
                                    <Select placeholder="Seleccione el tipo">
                                        <Select.Option value="Evaluación Fase 1">Evaluación Fase 1</Select.Option>
                                        <Select.Option value="Evaluación Fase 2">Evaluación Fase 2</Select.Option>
                                        <Select.Option value="Real">Real</Select.Option>
                                    </Select>
                                </Form.Item>
                                <Row gutter={16}>
                                    <Col span={8}>
                                        <Form.Item name="balance" label="Balance Inicial" rules={[{ required: true, message: 'Requerido' }]}>
                                            <InputNumber style={{ width: '100%' }} />
                                        </Form.Item>
                                    </Col>
                                    <Col span={8}>
                                        <Form.Item name="pnlDiario" label="PNL Diario" rules={[{ required: true, message: 'Requerido' }]}>
                                            <InputNumber style={{ width: '100%' }} />
                                        </Form.Item>
                                    </Col>
                                    <Col span={8}>
                                        <Form.Item name="goal" label="Meta / Retiro" rules={[{ required: true, message: 'Requerido' }]}>
                                            <InputNumber style={{ width: '100%' }} />
                                        </Form.Item>
                                    </Col>
                                </Row>
                            </Form>
                        </Modal>

                        {/* Modal Nuevo Usuario */}
                        <Modal title="Nuevo Usuario" open={isUserModalVisible} onCancel={() => { setIsUserModalVisible(false); userForm.resetFields(); }} onOk={() => userForm.submit()} okText="Crear Usuario" cancelText="Cancelar">
                            <Form form={userForm} layout="vertical" onFinish={handleUserSubmit}>
                                <Form.Item name="username" label="Nombre de Usuario" rules={[{ required: true, message: 'Requerido' }]}>
                                    <Input placeholder="Ej. trader1" />
                                </Form.Item>
                                <Form.Item name="password" label="Contraseña" rules={[{ required: true, message: 'Requerido' }]}>
                                    <Input.Password placeholder="Contraseña segura" />
                                </Form.Item>
                                <Form.Item name="role" label="Rol" rules={[{ required: true, message: 'Requerido' }]} initialValue="viewer">
                                    <Select>
                                        <Select.Option value="admin">Administrador</Select.Option>
                                        <Select.Option value="viewer">Visor</Select.Option>
                                    </Select>
                                </Form.Item>
                            </Form>
                        </Modal>

                    </ConfigProvider>
                );
            };

            const rootNode = document.getElementById('root');
            if (window.ReactDOM && window.ReactDOM.createRoot) {
                const root = window.ReactDOM.createRoot(rootNode);
                root.render(<App />);
            } else if (window.ReactDOM) {
                window.ReactDOM.render(<App />, rootNode);
            } else {
                console.error("ReactDOM not found.");
                rootNode.innerHTML = "<h1>Error: ReactDOM not found</h1>";
            }
        } catch (err) {
            console.error(err);
            document.getElementById('root').innerHTML = "<h1>Error en el renderizado</h1><pre>" + err.message + "</pre>";
        }
    </script>
</body>

</html>
