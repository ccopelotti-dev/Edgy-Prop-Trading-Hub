                                                                const healthPercent = Math.max(0, 100 - ((currentLoss / allowedLoss) * 100));
                                                                return (
                                                                    <div style={{ width: 100 }} title={`Threshold Total: $${record.total_loss_limit?.toLocaleString() || (record.balance - allowedLoss).toLocaleString()}`}>
                                                                        <Progress percent={parseFloat(healthPercent.toFixed(1))} strokeColor={healthPercent > 50 ? '#52c41a' : (healthPercent > 20 ? '#faad14' : '#f5222d')} />
                                                                    </div>
                                                                );
                                                            }},
                                                            { title: 'Meta / Retiro', dataIndex: 'goal', key: 'goal', render: val => val ? `$ ${val.toLocaleString()}` : '-' },
                                                            {
                                                                title: 'Progreso', key: 'prog', render: (_, record) => {
                                                                    let percent = getProgressPercent(record.balance + (record.pnl_diario || 0), record.balance, record.goal);
                                                                    const exactPercent = percent.toFixed(1);
                                                                    let percentUI = percent < 0 ? 0 : (percent > 100 ? 100 : percent);
                                                                    return (
                                                                        <div style={{ width: 140 }}>
                                                                            <Progress percent={percentUI} format={() => `${exactPercent}%`} status={(record.pnl_diario || 0) < 0 ? 'exception' : 'active'} strokeColor={(record.pnl_diario || 0) >= 0 ? getProgressColor(percent) : undefined} />
                                                                        </div>
                                                                    );
                                                                }
                                                            },
                                                            { title: 'Acción', key: 'action', render: (_, record) => <Button type="text" danger icon={DeleteOutlined && <DeleteOutlined />} onClick={() => handleDeleteProp(record.id)} /> }
                                                        ]}
                                                    />
                                                </Card>
                                            );
                                        })}
                                    </div>

                                    <div style={{ display: activeMenu === 'configuracion' ? 'block' : 'none' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
                                            <div>
                                                <Title level={2} style={{ marginBottom: 4 }}>Configuración del Sistema</Title>
                                                <Text type="secondary" style={{ fontSize: 16 }}>Gestión de usuarios y accesos.</Text>
                                            </div>
                                            <Button type="primary" icon={PlusOutlined && <PlusOutlined />} onClick={() => setIsUserModalVisible(true)}>
                                                Nuevo Usuario
                                            </Button>
                                        </div>
                                        <Card title={<span style={{ fontSize: 18, color: PRIMARY_COLOR }}>Usuarios Registrados</span>} className="premium-card">
                                            <Table
                                                dataSource={users}
                                                rowKey="id"
                                                pagination={false}
                                                columns={[
                                                    { title: 'ID', dataIndex: 'id', key: 'id' },
                                                    { title: 'Usuario', dataIndex: 'username', key: 'username', render: text => <strong>{text}</strong> },
                                                    { title: 'Rol', dataIndex: 'role', key: 'role', render: text => <Tag color={text === 'admin' ? 'blue' : 'default'}>{text.toUpperCase()}</Tag> },
                                                    {
                                                        title: 'Acciones', key: 'actions', render: (_, record) => (
                                                            <Button type="text" danger icon={DeleteOutlined && <DeleteOutlined />} onClick={() => handleDeleteUser(record.id)}>Eliminar</Button>
                                                        )
                                                    }
                                                ]}
                                            />
                                        </Card>
                                    </div>

                                    {/* MICROCONTABILIDAD View */}
                                    <div style={{ display: activeMenu === 'microcontabilidad' ? 'block' : 'none' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
                                            <div>
                                                <Title level={2} style={{ marginBottom: 4 }}>Microcontabilidad</Title>
                                                <Text type="secondary" style={{ fontSize: 16 }}>Dashboard corporativo de flujo de caja y rentabilidad.</Text>
                                            </div>
                                            <Space>
                                                <Button type="primary" icon={PlusOutlined && <PlusOutlined />} onClick={() => setIsMicroModalVisible(true)}>
                                                    Registrar Movimiento
                                                </Button>
                                            </Space>
                                        </div>

                                        {/* Tarjetas de Resumen */}
                                        <Row gutter={16} style={{ marginBottom: 24 }}>
                                            <Col span={8}>
                                                <Card className="premium-card">
                                                    <Statistic
                                                        title="Total Ingresos"
                                                        value={transactions.filter(t => t.type === 'Ingreso').reduce((sum, t) => sum + (Number(t.amount) || 0), 0)}
                                                        precision={2}
                                                        valueStyle={{ color: '#3f8600' }}
                                                        prefix={RiseOutlined && <RiseOutlined />}
                                                        suffix="USD"
                                                    />
                                                </Card>
                                            </Col>
                                            <Col span={8}>
                                                <Card className="premium-card">
                                                    <Statistic
                                                        title="Total Egresos"
                                                        value={transactions.filter(t => t.type === 'Egreso').reduce((sum, t) => sum + (Number(t.amount) || 0), 0)}
                                                        precision={2}
                                                        valueStyle={{ color: '#cf1322' }}
                                                        prefix={FallOutlined && <FallOutlined />}
                                                        suffix="USD"
                                                    />
                                                </Card>
                                            </Col>
                                            <Col span={8}>
                                                <Card className="premium-card">
                                                    <Statistic
                                                        title="Saldo Actual (Capital)"
                                                        value={transactions.filter(t => t.type === 'Ingreso').reduce((sum, t) => sum + (Number(t.amount) || 0), 0) - transactions.filter(t => t.type === 'Egreso').reduce((sum, t) => sum + (Number(t.amount) || 0), 0)}
                                                        precision={2}
                                                        valueStyle={{ color: '#1677ff' }}
                                                        prefix={WalletOutlined && <WalletOutlined />}
                                                        suffix="USD"
                                                    />
                                                </Card>
                                            </Col>
                                        </Row>

                                        {/* Tabla de Movimientos */}
                                        <Card title={<span style={{ fontSize: 18, color: PRIMARY_COLOR }}>Historial de Movimientos</span>} className="premium-card">
                                            <Table
                                                dataSource={transactions}
                                                rowKey={(record) => record.id || record.date}
                                                pagination={{ pageSize: 10 }}
                                                columns={[
                                                    { 
                                                        title: 'Fecha', 
                                                        dataIndex: 'date', 
                                                        key: 'date', 
                                                        render: text => text ? new Date(text).toLocaleDateString() : '-' 
                                                    },
                                                    { 
                                                        title: 'Tipo', 
                                                        dataIndex: 'type', 
                                                        key: 'type', 
                                                        render: type => {
                                                            const color = type === 'Ingreso' ? 'success' : 'error';
                                                            const Icon = type === 'Ingreso' ? (RiseOutlined ? <RiseOutlined /> : null) : (FallOutlined ? <FallOutlined /> : null);
                                                            return (
                                                                <Tag color={color}>
                                                                    {Icon} {type ? type.toUpperCase() : ''}
                                                                </Tag>
                                                            );
                                                        }
                                                    },
                                                    { title: 'Categoría', dataIndex: 'category', key: 'category' },
                                                    { title: 'Descripción', dataIndex: 'description', key: 'description' },
                                                    { 
                                                        title: 'Monto ($)', 
                                                        dataIndex: 'amount', 
                                                        key: 'amount', 
                                                        render: (amount, record) => (
                                                            <strong style={{ color: record.type === 'Ingreso' ? '#3f8600' : '#cf1322' }}>
                                                                {record.type === 'Ingreso' ? '+' : '-'}${Number(amount).toFixed(2)}
                                                            </strong>
                                                        )
                                                    }
                                                ]}
                                            />
                                        </Card>
                                    </div>

                                </Content>
                            </Layout>
                        </Layout>

                        {/* Modal para Editar */}
                        <Modal
                            title="Editar Datos de la Cuenta"
                            open={isModalVisible}
                            onOk={handleModalOk}
                            onCancel={handleModalCancel}
                            width={600}
                            footer={[
                                <div key="footer-actions" style={{ display: 'flex', justifyContent: 'space-between', width: '100%' }}>
                                    <Button key="delete" danger icon={DeleteOutlined && <DeleteOutlined />} onClick={handleDeleteAccount}>
                                        Eliminar
                                    </Button>
                                    <div>
                                        <Button key="cancel" onClick={handleModalCancel}>
                                            Cancelar
                                        </Button>
                                        <Button key="submit" type="primary" onClick={handleModalOk}>
                                            Guardar Cambios
                                        </Button>
                                    </div>
                                </div>
                            ]}
                        >
                            <Form form={form} layout="vertical">
                                <Row gutter={16}>
                                    <Col span={12}>
                                        <Form.Item name="name" label="Nombre de Cuenta" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Input placeholder="Ej. Tradeify PA #1" />
                                        </Form.Item>
                                    </Col>
                                    <Col span={12}>
                                        <Form.Item name="company" label="Compañía" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Input placeholder="Ej. Tradeify" />
                                        </Form.Item>
                                    </Col>
                                </Row>
                                <Row gutter={16}>
                                    <Col span={24}>
                                        <Form.Item name="type" label="Tipo de Cuenta" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Select placeholder="Selecciona el tipo">
                                                <Select.Option value="Evaluación">Evaluación</Select.Option>
                                                <Select.Option value="Master">Master / Fondeada</Select.Option>
                                                <Select.Option value="Live">Live / Real</Select.Option>
                                            </Select>
                                        </Form.Item>
                                    </Col>
                                </Row>
                                <Row gutter={16}>
                                    <Col span={12}>
                                        <Form.Item name="balance" label="Balance Actual ($)" rules={[{ required: true, message: 'Requerido' }]}>
                                            <InputNumber style={{ width: '100%' }} formatter={value => `$ ${value}`.replace(/\B(?=(\d{3})+(?!\d))/g, ',')} parser={value => value.replace(/\$\s?|(,*)/g, '')} />
                                        </Form.Item>
                                    </Col>
                                    <Col span={12}>
                                        <Form.Item name="goal" label="Meta de Capital ($)" rules={[{ required: true, message: 'Requerido' }]}>
                                            <InputNumber style={{ width: '100%' }} formatter={value => `$ ${value}`.replace(/\B(?=(\d{3})+(?!\d))/g, ',')} parser={value => value.replace(/\$\s?|(,*)/g, '')} />
                                        </Form.Item>
                                    </Col>
                                </Row>
                            </Form>
                        </Modal>

                        {/* Modal para Nueva Cuenta */}
                        <Modal
                            title="Añadir Nueva Cuenta"
                            open={isNewModalVisible}
                            onOk={handleNewModalOk}
                            onCancel={() => setIsNewModalVisible(false)}
                            okText="Crear Cuenta"
                            cancelText="Cancelar"
                            width={600}
                        >
                            <Form form={newForm} layout="vertical">
                                <Row gutter={16}>
                                    <Col span={12}>
                                        <Form.Item name="name" label="Nombre de Cuenta" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Input placeholder="Ej. Apex 50k - 01" />
                                        </Form.Item>
                                    </Col>
                                    <Col span={12}>
                                        <Form.Item name="company" label="Compañía" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Input placeholder="Ej. Tradeify" />
                                        </Form.Item>
                                    </Col>
                                </Row>
                                <Row gutter={16}>
                                    <Col span={24}>
                                        <Form.Item name="type" label="Tipo de Cuenta" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Select placeholder="Selecciona el tipo">
                                                <Select.Option value="Evaluación">Evaluación</Select.Option>
                                                <Select.Option value="Master">Master / Fondeada</Select.Option>
                                                <Select.Option value="Live">Live / Real</Select.Option>
                                            </Select>
                                        </Form.Item>
                                    </Col>
                                </Row>
                                <Row gutter={16}>
                                    <Col span={12}>
                                        <Form.Item name="initial" label="Balance Inicial ($)" rules={[{ required: true, message: 'Requerido' }]}>
                                            <InputNumber style={{ width: '100%' }} formatter={value => `$ ${value}`.replace(/\B(?=(\d{3})+(?!\d))/g, ',')} parser={value => value.replace(/\$\s?|(,*)/g, '')} />
                                        </Form.Item>
                                    </Col>
                                    <Col span={12}>
                                        <Form.Item name="goal" label="Meta de Capital ($)" rules={[{ required: true, message: 'Requerido' }]}>
                                            <InputNumber style={{ width: '100%' }} formatter={value => `$ ${value}`.replace(/\B(?=(\d{3})+(?!\d))/g, ',')} parser={value => value.replace(/\$\s?|(,*)/g, '')} />
                                        </Form.Item>
                                    </Col>
                                </Row>
                                <Row gutter={16}>
                                    <Col span={12}>
                                        <Form.Item name="drawdownType" label="Tipo de Drawdown" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Select placeholder="Selecciona el tipo">
                                                <Select.Option value="EOD">EOD (End of Day/Lucid Flex)</Select.Option>
                                                <Select.Option value="Trailing">Trailing</Select.Option>
                                                <Select.Option value="Fijo">Fijo</Select.Option>
                                            </Select>
                                        </Form.Item>
                                    </Col>
                                    <Col span={12}>
                                        <Form.Item name="maxDrawdown" label="Drawdown Máximo Permitido ($)" rules={[{ required: true, message: 'Requerido' }]}>
                                            <InputNumber style={{ width: '100%' }} formatter={value => `$ ${value}`.replace(/\B(?=(\d{3})+(?!\d))/g, ',')} parser={value => value.replace(/\$\s?|(,*)/g, '')} />
                                        </Form.Item>
                                    </Col>
                                </Row>
                                <Row gutter={16}>
                                    <Col span={12}>
                                        <Form.Item name="creation_date" label="Fecha de Creación" rules={[{ required: true, message: 'Requerido' }]}>
                                            <DatePicker style={{ width: '100%' }} format="DD/MM/YYYY" placeholder="Seleccionar fecha" />
                                        </Form.Item>
                                    </Col>
                                    <Col span={12}>
                                        <Form.Item name="expiration_date" label="Fecha de Vencimiento">
                                            <DatePicker style={{ width: '100%' }} format="DD/MM/YYYY" placeholder="Sin vencimiento (opcional)" />
                                        </Form.Item>
                                    </Col>
                                </Row>
                                <Row gutter={16}>
                                    <Col span={12}>
                                        <Form.Item name="acquisitionCost" label="Costo de Adquisición ($)">
                                            <InputNumber style={{ width: '100%' }} min={0} formatter={value => `$ ${value}`.replace(/\B(?=(\d{3})+(?!\d))/g, ',')} parser={value => value.replace(/\$\s?|(,*)/g, '')} placeholder="Ej. 150" />
                                        </Form.Item>
                                    </Col>
                                </Row>
                            </Form>
                        </Modal>

                        {/* Modal para Registrar Movimiento */}
                        <Modal
                            title="Registrar Movimiento Contable"
                            open={isMicroModalVisible}
                            onOk={handleMicroSubmit}
                            onCancel={() => { setIsMicroModalVisible(false); microForm.resetFields(); }}
                            okText="Guardar Movimiento"
                            cancelText="Cancelar"
                            width={500}
                        >
                            <Form form={microForm} layout="vertical" initialValues={{ type: 'Ingreso', category: 'Capital de Trabajo' }}>
                                <Row gutter={16}>
                                    <Col span={12}>
                                        <Form.Item name="type" label="Tipo de Movimiento" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Select>
                                                <Select.Option value="Ingreso">Ingreso (+)</Select.Option>
                                                <Select.Option value="Egreso">Egreso (-)</Select.Option>
                                            </Select>
                                        </Form.Item>
                                    </Col>
                                    <Col span={12}>
                                        <Form.Item name="category" label="Categoría" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Select>
                                                <Select.Option value="Capital de Trabajo">Capital de Trabajo (Ej. Evaluaciones)</Select.Option>
                                                <Select.Option value="Retiros">Retiros (Payouts)</Select.Option>
                                                <Select.Option value="Servicios">Servicios (Ej. Internet, Software)</Select.Option>
                                                <Select.Option value="Varios">Varios (Otros)</Select.Option>
                                            </Select>
                                        </Form.Item>
                                    </Col>
                                </Row>

                                <Form.Item name="amount" label="Monto en USD ($)" rules={[{ required: true, message: 'Requerido' }]}>
                                    <InputNumber style={{ width: '100%' }} min={0.01} step={1} formatter={value => `$ ${value}`.replace(/\B(?=(\d{3})+(?!\d))/g, ',')} parser={value => value.replace(/\$\s?|(,*)/g, '')} />
                                </Form.Item>

                                <Form.Item name="description" label="Descripción / Concepto" rules={[{ required: true, message: 'Requerido' }]}>
                                    <Input placeholder="Ej. Retiro PA Tradeify #1" />
                                </Form.Item>

                                <Form.Item name="transaction_date" label="Fecha del Movimiento (Opcional)">
                                    <DatePicker style={{ width: '100%' }} format="DD/MM/YYYY HH:mm" showTime placeholder="Por defecto será ahora mismo si dejas en blanco" />
                                </Form.Item>
                            </Form>
                        </Modal>

                        {/* Modal para Avance Manual */}
                        <Modal
                            title="Cargar Avance Manual"
                            open={isLucidModalVisible}
                            onOk={handleLucidOk}
                            onCancel={() => { setIsLucidModalVisible(false); lucidForm.resetFields(); }}
                            okText="Guardar Avance"
                            cancelText="Cancelar"
                            width={400}
                        >
                            <Form form={lucidForm} layout="vertical">
                                <Form.Item name="accountKey" label="Seleccionar Cuenta" rules={[{ required: true, message: 'Requerido' }]}>
                                    <Select placeholder="Seleccione la cuenta a actualizar">
                                        {accounts.map(acc => (
                                            <Select.Option key={acc.key || acc.id} value={acc.key || acc.id}>
                                                {acc.name} ({acc.company})
                                            </Select.Option>
                                        ))}
                                    </Select>
                                </Form.Item>
                                <Form.Item name="dailyPnl" label="P&L / Avance a Registrar ($)" rules={[{ required: true, message: 'Requerido' }]}>
                                    <InputNumber style={{ width: '100%' }} formatter={value => `$ ${value}`.replace(/\B(?=(\d{3})+(?!\d))/g, ',')} parser={value => value.replace(/\$\s?|(,*)/g, '')} />
                                </Form.Item>
                            </Form>
                        </Modal>

                        {/* Modal Prop Trading */}
                        <Modal title="Nueva Cuenta Prop Trading" open={isPropModalVisible} onCancel={() => { setIsPropModalVisible(false); propForm.resetFields(); }} onOk={() => propForm.submit()} okText="Guardar" cancelText="Cancelar">
                            <Form form={propForm} layout="vertical" onFinish={handlePropSubmit}>
                                <Row gutter={16}>
                                    <Col span={12}>
                                        <Form.Item name="firm" label="Compañía" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Input placeholder="Ej. Tradeify, Topstep" />
                                        </Form.Item>
                                    </Col>
                                    <Col span={12}>
                                        <Form.Item name="name" label="Nombre" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Input placeholder="Ej. Tradeify PA #1" />
                                        </Form.Item>
                                    </Col>
                                </Row>
                                <Form.Item name="type" label="Tipo" rules={[{ required: true, message: 'Requerido' }]}>
                                    <Select placeholder="Seleccione el tipo">
                                        <Select.Option value="Evaluación Fase 1">Evaluación Fase 1</Select.Option>
                                        <Select.Option value="Evaluación Fase 2">Evaluación Fase 2</Select.Option>
                                        <Select.Option value="Real">Real</Select.Option>
                                    </Select>
                                </Form.Item>
                                <Row gutter={16}>
                                    <Col span={8}>
                                        <Form.Item name="balance" label="Balance Inicial" rules={[{ required: true, message: 'Requerido' }]}>
                                            <InputNumber style={{ width: '100%' }} />
                                        </Form.Item>
                                    </Col>
                                    <Col span={8}>
                                        <Form.Item name="pnlDiario" label="PNL Diario" rules={[{ required: true, message: 'Requerido' }]}>
                                            <InputNumber style={{ width: '100%' }} />
                                        </Form.Item>
                                    </Col>
                                    <Col span={8}>
                                        <Form.Item name="goal" label="Meta / Retiro" rules={[{ required: true, message: 'Requerido' }]}>
                                            <InputNumber style={{ width: '100%' }} />
                                        </Form.Item>
                                    </Col>
                                </Row>
                                <Row gutter={16}>
                                    <Col span={8}>
                                        <Form.Item name="dailyDrawdownPercent" label="% DD Diario Máx" rules={[{ required: true, message: 'Requerido' }]}>
                                            <InputNumber style={{ width: '100%' }} min={0} max={100} placeholder="Ej. 4" />
                                        </Form.Item>
                                    </Col>
                                    <Col span={8}>
                                        <Form.Item name="totalDrawdownPercent" label="% DD Total Máx" rules={[{ required: true, message: 'Requerido' }]}>
                                            <InputNumber style={{ width: '100%' }} min={0} max={100} placeholder="Ej. 8" />
                                        </Form.Item>
                                    </Col>
                                    <Col span={8}>
                                        <Form.Item name="drawdownType" label="Tipo de Drawdown" rules={[{ required: true, message: 'Requerido' }]}>
                                            <Select placeholder="Seleccione">
                                                <Select.Option value="Fijo">Fijo</Select.Option>
                                                <Select.Option value="Balance Equity">Balance Equity</Select.Option>
                                            </Select>
                                        </Form.Item>
                                    </Col>
                                </Row>
                                <Row gutter={16}>
                                    <Col span={12}>
                                        <Form.Item name="acquisitionCost" label="Costo de Adquisición ($)">
                                            <InputNumber style={{ width: '100%' }} min={0} formatter={value => `$ ${value}`.replace(/\B(?=(\d{3})+(?!\d))/g, ',')} parser={value => value.replace(/\$\s?|(,*)/g, '')} placeholder="Ej. 49" />
                                        </Form.Item>
                                    </Col>
                                </Row>
                            </Form>
                        </Modal>

                        {/* Modales Nuevos CFD */}
                        <Modal title="Carga Rápida CFD" open={isCfdCargaVisible} onCancel={() => { setIsCfdCargaVisible(false); cfdCargaForm.resetFields(); }} onOk={handleCfdCargaOk} okText="Actualizar" cancelText="Cancelar">
                            <Form form={cfdCargaForm} layout="vertical">
                                <Form.Item name="cfdAccountId" label="Selecciona la Cuenta CFD" rules={[{ required: true, message: 'Requerido' }]}>
                                    <Select placeholder="Selecciona la cuenta">
                                        {propTradingData.map(acc => <Select.Option key={acc.id} value={acc.id}>{acc.name} ({acc.firm}) - Bal: ${acc.balance}</Select.Option>)}
                                    </Select>
                                </Form.Item>
                                <Form.Item name="balanceCerrado" label="Balance Cerrado Hoy ($)" rules={[{ required: true, message: 'Requerido' }]}>
                                    <InputNumber style={{ width: '100%' }} placeholder="Ej. 51200" />
                                </Form.Item>
                                <Form.Item name="equityActual" label="Equity Actual (con Flotante) ($)" rules={[{ required: true, message: 'Requerido' }]}>
                                    <InputNumber style={{ width: '100%' }} placeholder="Ej. 50900" />
                                </Form.Item>
                            </Form>
                        </Modal>

                        <Modal title="Importar Reporte MT4/MT5" open={isCfdImportVisible} onCancel={() => { setIsCfdImportVisible(false); cfdImportForm.resetFields(); }} onOk={() => console.log('Import modal form submit pending logic')} okText="Analizar HTML" cancelText="Cerrar">
                             <Form form={cfdImportForm} layout="vertical">
                                <Form.Item name="cfdAccountIdImport" label="Cuenta de Destino" rules={[{ required: true, message: 'Selecciona la cuenta destino para amarrar este reporte' }]}>
                                    <Select placeholder="Selecciona la cuenta">
                                        {propTradingData.map(acc => <Select.Option key={acc.id} value={acc.id}>{acc.name} ({acc.firm})</Select.Option>)}
                                    </Select>
                                </Form.Item>
                                <div style={{ border: '2px dashed #1677ff', padding: '30px', textAlign: 'center', borderRadius: '8px', cursor: 'pointer', backgroundColor: '#e6f4ff' }} onClick={() => document.getElementById('mtReportUpload').click()}>
                                    <strong>Haz clic aquí para seleccionar tu repote HTML detallado</strong>
                                    <br />
                                    <span style={{color: 'gray', fontSize: '13px'}}>Solo archivos provenientes de MT4 o MT5 (.htm / .html)</span>
                                    <input type="file" id="mtReportUpload" style={{ display: 'none' }} accept=".html, .htm" onChange={(e) => {
                                        const file = e.target.files[0];
                                        if (file) {
                                            const accountId = cfdImportForm.getFieldValue('cfdAccountIdImport');
                                            if (!accountId) {
                                                message.warning('Debes seleccionar la cuenta destino antes de adjuntar el archivo.');
                                                e.target.value = null;
                                                return;
                                            }
                                            const reader = new FileReader();
                                            reader.onload = (evt) => window.parseMTReport(evt.target.result, accountId);
                                            reader.readAsText(file);
                                            e.target.value = null;
                                        }
                                    }} />
                                </div>
                            </Form>
                        </Modal>

                        {/* Modal Nuevo Usuario */}
                        <Modal title="Nuevo Usuario" open={isUserModalVisible} onCancel={() => { setIsUserModalVisible(false); userForm.resetFields(); }} onOk={() => userForm.submit()} okText="Crear Usuario" cancelText="Cancelar">
                            <Form form={userForm} layout="vertical" onFinish={handleUserSubmit}>
                                <Form.Item name="username" label="Nombre de Usuario" rules={[{ required: true, message: 'Requerido' }]}>
                                    <Input placeholder="Ej. trader1" />
                                </Form.Item>
                                <Form.Item name="password" label="Contraseña" rules={[{ required: true, message: 'Requerido' }]}>
                                    <Input.Password placeholder="Contraseña segura" />
                                </Form.Item>
                                <Form.Item name="role" label="Rol" rules={[{ required: true, message: 'Requerido' }]} initialValue="viewer">
                                    <Select>
                                        <Select.Option value="admin">Administrador</Select.Option>
                                        <Select.Option value="viewer">Visor</Select.Option>
                                    </Select>
                                </Form.Item>
                            </Form>
                        </Modal>

                    </ConfigProvider>
                );
            };

            const rootNode = document.getElementById('root');
            if (window.ReactDOM && window.ReactDOM.createRoot) {
                const root = window.ReactDOM.createRoot(rootNode);
                root.render(<App />);
            } else if (window.ReactDOM) {
                window.ReactDOM.render(<App />, rootNode);
            } else {
                console.error("ReactDOM not found.");
                rootNode.innerHTML = "<h1>Error: ReactDOM not found</h1>";
            }
        } catch (err) {
            console.error(err);
            document.getElementById('root').innerHTML = "<h1>Error en el renderizado</h1><pre>" + err.message + "</pre>";
        }
    </script>
</body>

</html>
